<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Res to wall</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workbench">
        <div class="toolbar">
          <div>
            <h1 style="font-size: 42px">REStoWALL</h1>
            <p>archaeo-geophysics Lissus</p>
          </div>
          <div class="toolbar-actions">
            <div class="mode-switch" role="tablist" aria-label="Processing mode">
              <button
                type="button"
                class="mode-button active"
                data-mode="3d"
                role="tab"
                aria-selected="true"
              >
                3D depth-cube
              </button>
              <button
                type="button"
                class="mode-button"
                data-mode="2d"
                role="tab"
                aria-selected="false"
              >
                2D plan map
              </button>
            </div>
            <button form="run-form" type="submit" id="run-button">
              Run Workflow
            </button>
          </div>
        </div>

        <p class="mode-description" id="mode-description">
          3D mode: depth-resolved cube with persistence across slices
          (Lezha_3D-style workbook with Thellësia/Depth column).
        </p>

        <form id="run-form" class="control-grid">
          <input type="hidden" name="mode" id="mode-input" value="3d" />

          <label class="file-control">
            <span>Input Workbook</span>
            <input type="file" name="input_file" accept=".xls,.xlsx" required />
          </label>

          <label data-modes="3d 2d">
            <span>Grid Resolution (m)</span>
            <input
              type="number"
              name="grid_resolution"
              value="0.55"
              step="0.05"
              min="0.05"
              data-default-3d="0.55"
              data-default-2d="0.5"
            />
          </label>
          <label data-modes="3d 2d">
            <span>Clip Low (%)</span>
            <input
              type="number"
              name="clip_low"
              value="2"
              step="0.5"
              min="0"
              max="49"
            />
          </label>
          <label data-modes="3d 2d">
            <span>Clip High (%)</span>
            <input
              type="number"
              name="clip_high"
              value="98"
              step="0.5"
              min="51"
              max="100"
            />
          </label>
          <label data-modes="3d 2d">
            <span>Median Size</span>
            <input
              type="number"
              name="median_size"
              value="3"
              step="1"
              min="1"
            />
          </label>
          <label data-modes="3d 2d">
            <span>Gaussian Sigma (m)</span>
            <input
              type="number"
              name="gaussian_sigma_m"
              value="2.5"
              step="0.1"
              min="0.1"
            />
          </label>
          <label data-modes="3d 2d">
            <span>Robust Z Threshold</span>
            <input
              type="number"
              name="robust_z_threshold"
              value="2.0"
              step="0.1"
              min="0"
            />
          </label>
          <label data-modes="3d 2d">
            <span>Max Extrapolation (m)</span>
            <input
              type="number"
              name="max_extrapolation_distance"
              value="2.6"
              step="0.1"
              min="0.1"
            />
          </label>
          <label data-modes="3d">
            <span>Min 3D Voxels</span>
            <input
              type="number"
              name="min_component_voxels"
              value="15"
              step="1"
              min="1"
            />
          </label>
          <label data-modes="3d">
            <span>Min Depth Slices</span>
            <input
              type="number"
              name="min_component_slices"
              value="2"
              step="1"
              min="1"
            />
          </label>
          <label data-modes="3d 2d">
            <span>Min Plan Cells</span>
            <input
              type="number"
              name="min_plan_cells"
              value="12"
              step="1"
              min="1"
            />
          </label>
        </form>
      </section>

      <section class="results-panel" id="results-panel" hidden>
        <div class="results-header">
          <div>
            <h2>Results</h2>
            <p id="status-line"></p>
          </div>
          <div class="download-row" id="download-row"></div>
        </div>

        <div class="map-grid" id="map-grid"></div>

        <div class="table-wrap">
          <table>
            <thead id="wall-head"></thead>
            <tbody id="wall-body"></tbody>
          </table>
        </div>
      </section>

      <p class="message" id="message" role="status"></p>
    </main>

    <script>
      const form = document.querySelector("#run-form");
      const button = document.querySelector("#run-button");
      const message = document.querySelector("#message");
      const panel = document.querySelector("#results-panel");
      const statusLine = document.querySelector("#status-line");
      const downloadRow = document.querySelector("#download-row");
      const mapGrid = document.querySelector("#map-grid");
      const wallHead = document.querySelector("#wall-head");
      const wallBody = document.querySelector("#wall-body");
      const modeInput = document.querySelector("#mode-input");
      const modeDescription = document.querySelector("#mode-description");
      const modeButtons = document.querySelectorAll(".mode-button");

      const MODE_DESCRIPTIONS = {
        "3d":
          "3D mode: depth-resolved cube with persistence across slices " +
          "(Lezha_3D-style workbook with Thellësia/Depth column).",
        "2d":
          "2D mode: single plan map (Piketa, Profili, East, North, Rd). " +
          "Logic identical to the 3D anomaly-enhancement chain - log10, P2-P98 " +
          "clipping, 0.5 m grid, 3x3 median, sigma=2.5 m background, robust Z>2.0.",
      };

      function applyMode(mode) {
        modeInput.value = mode;
        modeButtons.forEach((b) => {
          const isActive = b.dataset.mode === mode;
          b.classList.toggle("active", isActive);
          b.setAttribute("aria-selected", isActive ? "true" : "false");
        });
        modeDescription.textContent = MODE_DESCRIPTIONS[mode];

        document.querySelectorAll("[data-modes]").forEach((el) => {
          const modes = el.dataset.modes.split(/\s+/);
          const visible = modes.includes(mode);
          el.hidden = !visible;
          const input = el.querySelector("input");
          if (input) {
            input.disabled = !visible;
            const def = input.dataset[`default${mode === "3d" ? "3d" : "2d"}`];
            if (visible && def !== undefined) {
              input.value = def;
            }
          }
        });
      }

      modeButtons.forEach((b) => {
        b.addEventListener("click", () => applyMode(b.dataset.mode));
      });

      applyMode("3d");

      function setBusy(isBusy) {
        button.disabled = isBusy;
        button.textContent = isBusy ? "Processing..." : "Run Workflow";
      }

      function renderDownloads(files) {
        downloadRow.innerHTML = "";
        Object.entries(files).forEach(([name, url]) => {
          const link = document.createElement("a");
          link.href = url;
          link.textContent = name;
          link.className = "download-link";
          link.target = "_blank";
          downloadRow.appendChild(link);
        });
      }

      function renderMaps(maps) {
        mapGrid.innerHTML = "";
        maps.forEach((map) => {
          const figure = document.createElement("figure");
          const caption = document.createElement("figcaption");
          caption.textContent = map.caption;
          const img = document.createElement("img");
          img.alt = map.caption;
          img.src = `${map.url}?v=${Date.now()}`;
          figure.appendChild(caption);
          figure.appendChild(img);
          mapGrid.appendChild(figure);
        });
      }

      function renderTable(rows) {
        wallHead.innerHTML = "";
        wallBody.innerHTML = "";
        if (!rows.length) {
          wallBody.innerHTML =
            "<tr><td>No wall traces met the filtering criteria.</td></tr>";
          return;
        }

        const columns = Object.keys(rows[0]);
        const headRow = document.createElement("tr");
        columns.forEach((column) => {
          const th = document.createElement("th");
          th.textContent = column;
          headRow.appendChild(th);
        });
        wallHead.appendChild(headRow);

        rows.forEach((row) => {
          const tr = document.createElement("tr");
          columns.forEach((column) => {
            const td = document.createElement("td");
            const value = row[column];
            td.textContent =
              typeof value === "number" ? value.toFixed(3) : value;
            tr.appendChild(td);
          });
          wallBody.appendChild(tr);
        });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setBusy(true);
        panel.hidden = true;
        message.textContent = "Processing workbook...";

        try {
          const response = await fetch("/api/run", {
            method: "POST",
            body: new FormData(form),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || "Processing failed.");
          }

          const modeLabel = payload.mode === "2d" ? "2D plan-map" : "3D depth-cube";
          statusLine.textContent =
            `${payload.wall_count} possible wall trace(s) retained ` +
            `(${modeLabel} workflow).`;
          renderMaps(payload.maps || []);
          renderDownloads(payload.files);
          renderTable(payload.walls);
          panel.hidden = false;
          message.textContent = "Processing completed.";
        } catch (error) {
          message.textContent = error.message;
        } finally {
          setBusy(false);
        }
      });
    </script>
  </body>
</html>
