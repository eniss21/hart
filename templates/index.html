<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Res to wall</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workbench">
        <div class="toolbar">
          <div>
            <h1>Res to wall</h1>
          </div>
          <button form="run-form" type="submit" id="run-button">
            Run Workflow
          </button>
        </div>

        <form id="run-form" class="control-grid">
          <label class="file-control">
            <span>Input Workbook</span>
            <input type="file" name="input_file" accept=".xls,.xlsx" required />
          </label>

          <label>
            <span>Grid Resolution (m)</span>
            <input
              type="number"
              name="grid_resolution"
              value="0.55"
              step="0.1"
              min="0.05"
            />
          </label>
          <label>
            <span>Clip Low (%)</span>
            <input
              type="number"
              name="clip_low"
              value="2"
              step="0.5"
              min="0"
              max="49"
            />
          </label>
          <label>
            <span>Clip High (%)</span>
            <input
              type="number"
              name="clip_high"
              value="98"
              step="0.5"
              min="51"
              max="100"
            />
          </label>
          <label>
            <span>Median Size</span>
            <input
              type="number"
              name="median_size"
              value="3"
              step="1"
              min="1"
            />
          </label>
          <label>
            <span>Gaussian Sigma (m)</span>
            <input
              type="number"
              name="gaussian_sigma_m"
              value="2.5"
              step="0.1"
              min="0.1"
            />
          </label>
          <label>
            <span>Robust Z Threshold</span>
            <input
              type="number"
              name="robust_z_threshold"
              value="2.0"
              step="0.1"
              min="0"
            />
          </label>
          <label>
            <span>Max Extrapolation (m)</span>
            <input
              type="number"
              name="max_extrapolation_distance"
              value="2.6"
              step="0.1"
              min="0.1"
            />
          </label>
          <label>
            <span>Min 3D Voxels</span>
            <input
              type="number"
              name="min_component_voxels"
              value="15"
              step="1"
              min="1"
            />
          </label>
          <label>
            <span>Min Depth Slices</span>
            <input
              type="number"
              name="min_component_slices"
              value="2"
              step="1"
              min="1"
            />
          </label>
          <label>
            <span>Min Plan Cells</span>
            <input
              type="number"
              name="min_plan_cells"
              value="12"
              step="1"
              min="1"
            />
          </label>
        </form>
      </section>

      <section class="results-panel" id="results-panel" hidden>
        <div class="results-header">
          <div>
            <h2>Results</h2>
            <p id="status-line"></p>
          </div>
          <div class="download-row" id="download-row"></div>
        </div>

        <div class="map-grid">
          <figure>
            <figcaption>Diagnostic anomaly persistence map</figcaption>
            <img id="anomaly-map" alt="Wall traces with anomaly persistence" />
          </figure>
          <figure>
            <figcaption>Clean coordinate-grid trace map</figcaption>
            <img id="clean-map" alt="Wall traces on coordinate grid" />
          </figure>
        </div>

        <div class="table-wrap">
          <table>
            <thead id="wall-head"></thead>
            <tbody id="wall-body"></tbody>
          </table>
        </div>
      </section>

      <p class="message" id="message" role="status"></p>
    </main>

    <script>
      const form = document.querySelector("#run-form");
      const button = document.querySelector("#run-button");
      const message = document.querySelector("#message");
      const panel = document.querySelector("#results-panel");
      const statusLine = document.querySelector("#status-line");
      const downloadRow = document.querySelector("#download-row");
      const anomalyMap = document.querySelector("#anomaly-map");
      const cleanMap = document.querySelector("#clean-map");
      const wallHead = document.querySelector("#wall-head");
      const wallBody = document.querySelector("#wall-body");

      function setBusy(isBusy) {
        button.disabled = isBusy;
        button.textContent = isBusy ? "Processing..." : "Run Workflow";
      }

      function renderDownloads(files) {
        downloadRow.innerHTML = "";
        Object.entries(files).forEach(([name, url]) => {
          const link = document.createElement("a");
          link.href = url;
          link.textContent = name;
          link.className = "download-link";
          link.target = "_blank";
          downloadRow.appendChild(link);
        });
      }

      function renderTable(rows) {
        wallHead.innerHTML = "";
        wallBody.innerHTML = "";
        if (!rows.length) {
          wallBody.innerHTML =
            "<tr><td>No wall traces met the filtering criteria.</td></tr>";
          return;
        }

        const columns = Object.keys(rows[0]);
        const headRow = document.createElement("tr");
        columns.forEach((column) => {
          const th = document.createElement("th");
          th.textContent = column;
          headRow.appendChild(th);
        });
        wallHead.appendChild(headRow);

        rows.forEach((row) => {
          const tr = document.createElement("tr");
          columns.forEach((column) => {
            const td = document.createElement("td");
            const value = row[column];
            td.textContent =
              typeof value === "number" ? value.toFixed(3) : value;
            tr.appendChild(td);
          });
          wallBody.appendChild(tr);
        });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setBusy(true);
        panel.hidden = true;
        message.textContent = "Processing workbook...";

        try {
          const response = await fetch("/api/run", {
            method: "POST",
            body: new FormData(form),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || "Processing failed.");
          }

          statusLine.textContent = `${payload.wall_count} possible wall trace(s) retained after 3D cleaning and plan filtering.`;
          anomalyMap.src = `${payload.files["wall_traces_with_anomalies.png"]}?v=${Date.now()}`;
          cleanMap.src = `${payload.files["wall_traces_coordinate_grid_only.png"]}?v=${Date.now()}`;
          renderDownloads(payload.files);
          renderTable(payload.walls);
          panel.hidden = false;
          message.textContent = "Processing completed.";
        } catch (error) {
          message.textContent = error.message;
        } finally {
          setBusy(false);
        }
      });
    </script>
  </body>
</html>
